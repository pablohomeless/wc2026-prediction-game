        <div class="nav-logo-title">Porra Mundial 2026</div>
        <div class="nav-logo-sub">USA / Mexico / Canada</div>
      </div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Scoreboard</a></li>

<!-- ── Main ── -->
<main>
  <div class="container">
    <div class="space-y">

      <!-- Page header -->
      <div class="section-header">
        <h1>📊 Tournament Results</h1>
      </div>

      <!-- Results are built here -->
      <div id="resultsRoot"></div>

    </div>
  </div>
</main>

<!-- ── Footer ── -->
<footer>
  ⚽ Porra Mundial 2026 — FIFA World Cup USA/MEX/CAN &nbsp;|&nbsp;
  <a href="rules.html">Rules</a>
</footer>

<script src="data.js"></script>
<script>
  function toggleMenu() {
    document.getElementById('navMobile').classList.toggle('open');
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function teamDisp(code) {
    if (!code) return '—';
    const t = TEAMS[code];
    return t ? t.flag + ' ' + escHtml(t.name) : escHtml(code);
  }

  // ── RESULTS_DATA: the actual match/phase results to display ──────────────────
  // This object is read from ACTUAL_RESULTS in data.js and from RESULTS_DETAIL
  // which you can optionally define in data.js for richer match-by-match view.

  (function () {
    const ar = ACTUAL_RESULTS;
    const root = document.getElementById('resultsRoot');
    let html = '';

    // ── Group Winners Summary ──
    const gwDone = GROUPS.filter(g => ar.groupWinners && ar.groupWinners[g]).length;
    if (gwDone > 0) {
      html += `
        <div class="card">
          <div class="card-title">🏅 Group Winners (${gwDone}/12 decided)</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem">`;
      GROUPS.forEach(g => {
        const code = ar.groupWinners && ar.groupWinners[g];
        html += `
          <div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;padding:.5rem .75rem;font-size:.85rem">
            <span style="font-weight:700;color:var(--darkblue)">Group ${g}</span><br>
            <span style="font-weight:600">${code ? teamDisp(code) : '<span style="color:var(--gray-400)">TBD</span>'}</span>
          </div>`;
      });
      html += `</div></div>`;
    } else {
      html += `
        <div class="alert alert-info">
          ⏳ Group stage hasn't started yet. Check back on June 11, 2026!
        </div>`;
    }

    // ── Semi-finals ──
    if (ar.semiFinals) {
      html += `
        <div class="card">
          <div class="card-title">🏟️ Semi-finalists</div>
          <div style="display:flex;flex-wrap:wrap;gap:.5rem">`;
      ar.semiFinals.forEach(code => {
        html += `<span style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.4rem .9rem;font-size:.9rem;font-weight:600">${teamDisp(code)}</span>`;
      });
      html += `</div></div>`;
    }

    // ── Final & 3rd place ──
    if (ar.finalists || ar.champion || ar.thirdPlace) {
      html += `<div class="card"><div class="card-title">🏆 Final & 3rd Place</div>`;

      if (ar.finalists) {
        html += `
          <div style="margin-bottom:.75rem">
            <div class="pred-label" style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-500);margin-bottom:.35rem">Finalists</div>
            <div style="display:flex;gap:.5rem;flex-wrap:wrap">`;
        ar.finalists.forEach(c => {
          html += `<span style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.4rem .9rem;font-size:.9rem;font-weight:600">${teamDisp(c)}</span>`;
        });
        html += '</div></div>';
      }

      const rows = [];
      if (ar.champion)  rows.push({ icon: '🏆', label: 'Champion',      val: teamDisp(ar.champion),  pts: '10 pts' });
      if (ar.thirdPlace) rows.push({ icon: '🥉', label: '3rd Place',     val: teamDisp(ar.thirdPlace), pts: '2 pts' });
      if (ar.topScorer)  rows.push({ icon: '👟', label: 'Top Scorer',    val: escHtml(ar.topScorer),  pts: '5 pts' });

      if (rows.length) {
        html += `<div style="display:flex;flex-direction:column;gap:.35rem">`;
        rows.forEach(r => {
          html += `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--gray-50);border-radius:8px;font-size:.9rem">
              <span>${r.icon} <strong>${r.label}</strong></span>
              <span style="font-weight:700">${r.val}</span>
              <span style="color:var(--gray-400);font-size:.75rem">${r.pts}</span>
            </div>`;
        });
        html += '</div>';
      }

      html += '</div>';
    }

    // ── If nothing at all ──
    if (gwDone === 0 && !ar.semiFinals && !ar.champion) {
      html = `
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p style="font-weight:600;color:var(--gray-700)">Tournament hasn't started yet</p>
          <p style="margin-top:.4rem;font-size:.85rem">Check back on <strong>June 11, 2026</strong>!</p>
        </div>`;
    }

    root.innerHTML = html;
  })();
</script>
</body>
</html>
